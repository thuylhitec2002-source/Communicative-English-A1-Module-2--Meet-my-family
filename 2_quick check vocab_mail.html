<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Vocab Quiz - Challenge Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C5CE7;
            --success: #00B894;
            --error: #D63031;
            --warning: #FDCB6E;
            --bg: #F0F3F7;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }

        /* --- Quiz UI --- */
        #main-content { width: 100%; max-width: 600px; padding: 20px; }
        .quiz-card {
            background: var(--card-bg); border-radius: 2rem; padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); position: relative;
        }

        /* --- Hearts/Lives UI --- */
        .lives-container {
            display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; font-size: 1.5rem;
        }

        .word-highlight {
            color: var(--primary); background: #f0eeff; padding: 8px 15px;
            border-radius: 12px; display: inline-flex; align-items: center; gap: 10px;
            cursor: pointer; font-weight: 700; font-size: 1.5rem; margin: 15px 0;
        }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }

        .opt-btn {
            padding: 18px; border: 2px solid #f1f3f5; border-radius: 1.2rem;
            background: white; cursor: pointer; font-family: inherit; font-size: 1.05rem;
            font-weight: 600; text-align: left; transition: all 0.2s;
        }

        .opt-btn:hover:not(:disabled) { border-color: var(--primary); transform: translateX(5px); }
        .opt-btn.correct { background: #d1fae5 !important; border-color: var(--success) !important; color: #065f46; }
        .opt-btn.wrong { background: #fee2e2 !important; border-color: var(--error) !important; color: #991b1b; animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .translation-box {
            background: #fdf9f0; border-left: 5px solid var(--warning); padding: 15px;
            border-radius: 8px; margin-top: 20px; display: none;
        }

        .btn-next {
            width: 100%; padding: 16px; border-radius: 1rem; border: none;
            background: var(--primary); color: white; font-weight: 700;
            margin-top: 20px; cursor: pointer; display: none;
        }
    </style>
</head>
<body>

<main id="main-content">
    <div class="quiz-card">
        <div id="quiz-ui">
            <div class="lives-container" id="lives-display">❤️❤️❤️</div>
            <div id="q-count" style="text-align:center; font-weight:700; color:#b2bec3"></div>
            
            <div style="text-align: center;">
                <div id="question-word" class="word-highlight" onclick="speakCurrentWord()"></div>
                <div id="ipa-text" style="color: #636e72; margin-bottom: 20px;"></div>
            </div>

            <div id="options-container" class="options-grid"></div>
            <div id="translation-box" class="translation-box"></div>
            <button id="next-btn" class="btn-next" onclick="nextQuestion()">Tiếp tục →</button>
        </div>

        <div id="result-screen" style="display:none; text-align:center;">
            <h1>Kết thúc bài học!</h1>
            <h2 id="final-score"></h2>
            <button class="btn-next" style="display:block" onclick="location.reload()">Làm lại</button>
        </div>
    </div>
</main>

<audio id="snd-correct" src="https://tiengdong.com/wp-content/uploads/am-thanh-cau-tra-loi-dung-right-answer-capcut-www_tiengdong_com.mp3?_=1"></audio>
<audio id="snd-wrong" src="https://cdn.pixabay.com/audio/2022/03/10/audio_8b0fae46ef.mp3"></audio>

<script>
    // Dữ liệu từ vựng với "Nhiễu gần nghĩa" (Smart Distractors)
    const vocabData = [
        { en: "Homestay accommodation", ipa: "/ˈhəʊmsteɪ/", vn: "Ở cùng dân bản xứ", distractors: ["Khách sạn 5 sao", "Cắm trại ngoài trời", "Ký túc xá trường"], ex: "We chose homestay accommodation.", vi: "Chúng tôi chọn ở cùng dân bản xứ." },
        { en: "Host", ipa: "/həʊst/", vn: "Chủ nhà", distractors: ["Khách thuê", "Người làm vườn", "Người môi giới"], ex: "Our host was very kind.", vi: "Chủ nhà của chúng tôi rất tốt bụng." },
        { en: "Retired", ipa: "/rɪˈtaɪəd/", vn: "Đã nghỉ hưu", distractors: ["Đang tìm việc", "Đang đi học", "Đã bị sa thải"], ex: "He is a retired teacher.", vi: "Ông ấy là giáo viên đã nghỉ hưu." },
        { en: "Gardening", ipa: "/ˈɡɑːdnɪŋ/", vn: "Làm vườn", distractors: ["Nấu ăn", "Dọn dẹp nhà", "Trồng rừng"], ex: "She loves gardening.", vi: "Bà ấy yêu làm vườn." },
        { en: "Specialist", ipa: "/ˈspeʃ.əl.ɪst/", vn: "Chuyên gia", distractors: ["Người mới học", "Thực tập sinh", "Bệnh nhân"], ex: "She is a specialist in eye surgery.", vi: "Cô ấy là chuyên gia phẫu thuật mắt." },
        { en: "Friendly", ipa: "/ˈfrendli/", vn: "Thân thiện", distractors: ["Khó gần", "Nguy hiểm", "Lạnh lùng"], ex: "The staff is friendly.", vi: "Nhân viên rất thân thiện." },
        { en: "Regularly", ipa: "/ˈreɡjələli/", vn: "Thường xuyên", distractors: ["Hiếm khi", "Chưa bao giờ", "Đôi khi"], ex: "Exercise regularly.", vi: "Tập thể dục thường xuyên." },
        { en: "Briefly", ipa: "/ˈbriːfli/", vn: "Ngắn gọn", distractors: ["Chi tiết", "Dài dòng", "Lan man"], ex: "Please explain briefly.", vi: "Vui lòng giải thích ngắn gọn." },
        { en: "Nephew", ipa: "/ˈnefjuː/", vn: "Cháu trai (con anh chị em)", distractors: ["Cháu gái", "Con trai", "Anh họ"], ex: "My nephew is 5.", vi: "Cháu trai tôi 5 tuổi." },
        { en: "Reserved", ipa: "/rɪˈzɜːvd/", vn: "Kín đáo / Trầm tính", distractors: ["Cởi mở", "Ồn ào", "Tự tin"], ex: "He is a reserved person.", vi: "Anh ấy là người trầm tính." },
        { en: "Be close to", ipa: "/bi kləʊs tuː/", vn: "Gần với", distractors: ["Xa cách", "Đối diện", "Nằm trong"], ex: "It's close to the sea.", vi: "Nó gần biển." },
        { en: "Be far from", ipa: "/bi fɑːr frəm/", vn: "Xa khỏi", distractors: ["Sát bên", "Gần đây", "Bên cạnh"], ex: "It's far from here.", vi: "Nó cách xa đây." },
        { en: "Rent a house", ipa: "/rent ə haʊs/", vn: "Thuê một căn nhà", distractors: ["Mua nhà", "Bán nhà", "Sửa nhà"], ex: "I want to rent a house.", vi: "Tôi muốn thuê một căn nhà." }
    ];

    let currentIdx = 0;
    let score = 0;
    let lives = 3;
    let isAnswered = false;

    function speakCurrentWord() {
        const msg = new SpeechSynthesisUtterance(vocabData[currentIdx].en);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function loadQuestion() {
        isAnswered = false;
        lives = 3;
        updateLivesUI();
        
        const q = vocabData[currentIdx];
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('translation-box').style.display = 'none';
        document.getElementById('q-count').innerText = `CÂU ${currentIdx + 1} / ${vocabData.length}`;
        document.getElementById('question-word').innerText = q.en;
        document.getElementById('ipa-text').innerText = q.ipa;
        
        // Trộn đáp án đúng và 3 nhiễu
        const options = [q.vn, ...q.distractors].sort(() => Math.random() - 0.5);
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, btn);
            container.appendChild(btn);
        });

        speakCurrentWord();
    }

    function updateLivesUI() {
        const display = document.getElementById('lives-display');
        display.innerHTML = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
    }

    function checkAnswer(selected, btn) {
        if (isAnswered) return;
        
        const q = vocabData[currentIdx];
        
        if (selected === q.vn) {
            // ĐÚNG
            btn.classList.add('correct');
            document.getElementById('snd-correct').play();
            score++;
            finishQuestion();
        } else {
            // SAI
            lives--;
            updateLivesUI();
            btn.classList.add('wrong');
            btn.disabled = true; // Không cho chọn lại nút đó
            document.getElementById('snd-wrong').play();

            if (lives <= 0) {
                // Hết lượt
                revealCorrectAnswer();
                finishQuestion();
            }
        }
    }

    function revealCorrectAnswer() {
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => {
            if (b.innerText === vocabData[currentIdx].vn) {
                b.classList.add('correct');
            }
        });
    }

    function finishQuestion() {
        isAnswered = true;
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);
        
        const q = vocabData[currentIdx];
        const box = document.getElementById('translation-box');
        box.innerHTML = `<strong>Ví dụ:</strong> ${q.ex} <br> <em>${q.vi}</em>`;
        box.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < vocabData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `Bạn đúng ${score}/${vocabData.length} câu!`;
    }

    // Khởi tạo
    loadQuestion();
</script>
</body>
</html>
