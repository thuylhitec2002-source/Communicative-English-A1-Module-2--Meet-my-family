<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danny's English Interactive Hub - Homestay Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60;
            --primary-dark: #1e8449;
            --bg: #f4fcf7;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-header: #1b4d3e;
            --success: #27ae60;
            --error: #e74c3c;
            --shadow: 0 8px 15px rgba(0,0,0,0.05);
            --shadow-h: 0 15px 30px rgba(39, 174, 96, 0.15);
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-main);
        }

        .container { width: 100%; max-width: 900px; text-align: center; }

        /* --- SCREEN MANAGEMENT --- */
        .screen { display: none; animation: fadeIn 0.5s; }
        .active-screen { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- LOGIN CARD --- */
        .auth-card { background: white; padding: 50px; border-radius: 35px; box-shadow: var(--shadow-h); max-width: 450px; margin: 0 auto; border: 2px solid var(--primary); }
        .google-btn { background: white; border: 1px solid #dfe6e9; padding: 12px 25px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: bold; width: 100%; margin-top: 20px; }
        .google-btn:hover { background: #f8f9fa; transform: translateY(-2px); }

        /* --- MENU --- */
        .main-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .menu-card { background: white; padding: 40px 20px; border-radius: 25px; box-shadow: var(--shadow); cursor: pointer; transition: 0.3s; border-bottom: 5px solid var(--primary); }
        .menu-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-h); }
        .menu-card h2 { color: var(--primary); margin: 0 0 10px; }

        /* --- FLASHCARD --- */
        .card-container { perspective: 1200px; width: 100%; height: 420px; margin-bottom: 25px; }
        .card { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .card.flipped { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; border-radius: 35px; box-shadow: var(--shadow); background: white; border: 3px solid var(--primary); }
        .back { transform: rotateY(180deg); }
        
        .card-btn { position: absolute; top: 20px; left: 20px; width: 50px; height: 50px; border-radius: 50%; border: 1px solid #eee; background: #fff; cursor: pointer; font-size: 1.3rem; }

        .term-main { font-size: 2.8rem; font-weight: 800; color: var(--text-header); }
        .ipa { font-size: 1.4rem; color: #7f8c8d; margin: 10px 0; }
        .mean-text { font-size: 2.2rem; color: var(--primary); font-style: italic; }

        /* --- QUIZ --- */
        #quiz-section-content { background: white; padding: 50px; border-radius: 35px; box-shadow: var(--shadow); border: 2px solid var(--primary); }
        .quiz-input { width: 90%; padding: 15px; font-size: 1.8rem; border-radius: 15px; border: 3px solid #eee; text-align: center; outline: none; margin-top: 20px; }
        .quiz-input.correct { border-color: var(--success); background: #f0fff4; color: var(--success); }
        .quiz-input.incorrect { border-color: var(--error); background: #fff5f5; color: var(--error); }

        .nav-controls { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn-nav { padding: 14px 35px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; background: var(--primary); color: white; box-shadow: 0 5px 0 var(--primary-dark); }
        .btn-nav:disabled { background: #bdc3c7; box-shadow: 0 5px 0 #95a5a6; cursor: not-allowed; }
        
        .grid-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 25px; }
        .item-box { padding: 15px; background: white; border-radius: 12px; border: 1px solid #eee; cursor: pointer; font-weight: 600; }
        .item-box:hover { border-color: var(--primary); color: var(--primary); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="screen active-screen">
        <div class="auth-card">
            <h1 style="color: var(--primary);">Danny's Hub</h1>
            <p>Vui lòng đăng nhập để học bài <b>Homestay</b></p>
            <button id="login-btn" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" width="18"> Tiếp tục với Google
            </button>
            <p id="login-msg"></p>
        </div>
    </div>

    <div id="home-screen" class="screen">
        <h1>Lesson: Homestay</h1>
        <p id="user-welcome" style="font-weight: bold; color: var(--primary);"></p>
        <div class="main-menu">
            <div class="menu-card" onclick="startSection('study')">
                <h2>Thẻ Từ Vựng</h2>
                <p>Xem phiên âm & ví dụ</p>
            </div>
            <div class="menu-card" onclick="startSection('quiz')">
                <h2>Kiểm Tra Ghi Nhớ</h2>
                <p>Gõ tiếng Anh theo nghĩa</p>
            </div>
        </div>
        <button id="logout-btn" style="margin-top:40px; border:none; background:none; color:#95a5a6; cursor:pointer; font-weight:bold;">ĐĂNG XUẤT</button>
    </div>

    <div id="list-selection" class="screen">
        <div style="background: white; padding: 40px; border-radius: 35px; box-shadow: var(--shadow);">
            <h2>Danh sách từ vựng</h2>
            <div id="items-grid" class="grid-items"></div>
            <button class="btn-nav" style="background:#636e72; box-shadow:0 5px 0 #2d3436; margin-top:20px;" onclick="showScreen('home-screen')">Quay lại</button>
        </div>
    </div>

    <div id="flashcard-section" class="screen">
        <div class="card-container">
            <div class="card" id="main-card">
                <div class="front">
                    <button class="card-btn" onclick="showScreen('home-screen')">🏠</button>
                    <div id="display-term" class="term-main"></div>
                    <div id="display-ipa" class="ipa"></div>
                    <div style="cursor:pointer; font-size: 3rem;" onclick="speakCurrent(event)">🔊</div>
                </div>
                <div class="back">
                    <button class="card-btn" onclick="showScreen('home-screen')">🏠</button>
                    <div id="display-mean" class="mean-text"></div>
                    <div id="display-ex" style="margin-top:20px; font-weight:500; color:#555; font-size:1.1rem; padding:0 20px;"></div>
                </div>
            </div>
        </div>
        <div class="nav-controls">
            <button class="btn-nav" style="background:#636e72; box-shadow:0 5px 0 #2d3436;" onclick="prev()">Trước</button>
            <button style="width:65px; height:65px; border-radius:50%; border:none; background:#e8f5e9; color:var(--primary); font-size:1.5rem; cursor:pointer;" onclick="flipCard()">🔄</button>
            <button class="btn-nav" onclick="next()">Tiếp theo</button>
        </div>
    </div>

    <div id="quiz-section" class="screen">
        <div id="quiz-section-content">
            <button class="card-btn" onclick="showScreen('home-screen')">🏠</button>
            <h3 style="color:#7f8c8d;">Dịch sang tiếng Anh:</h3>
            <div id="quiz-vn" class="mean-text" style="margin: 20px 0;"></div>
            <input type="text" id="quiz-input" class="quiz-input" placeholder="Gõ câu trả lời..." autocomplete="off">
            <div id="quiz-feedback" style="margin-top: 20px; font-weight: bold; height: 30px;"></div>
            <div class="nav-controls">
                <button class="btn-nav" id="btn-next-quiz" onclick="nextQuiz()" disabled>Câu tiếp theo (Enter)</button>
            </div>
        </div>
    </div>

    <div id="congrats-screen" class="screen">
        <h1 style="font-size: 3rem; color: var(--success);">Well Done! 🎉</h1>
        <button class="btn-nav" onclick="showScreen('home-screen')">Luyện tập lại</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I", authDomain: "nguyen-am-tieng-anh.firebaseapp.com", projectId: "nguyen-am-tieng-anh" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", user.email));
            const snap = await getDocs(q);
            if (!snap.empty) {
                document.getElementById("user-welcome").innerText = "Chào " + user.displayName + "!";
                showScreen('home-screen');
            } else {
                alert("Email không có quyền truy cập!");
                await signOut(auth);
            }
        } else { showScreen('login-screen'); }
    });

    document.getElementById("login-btn").onclick = () => signInWithPopup(auth, provider);
    document.getElementById("logout-btn").onclick = () => signOut(auth).then(() => location.reload());

    const database = [
        { en: "doctor", ipa: "/ˈdɒk.tər/", vn: "bác sĩ", ex: "She is a retired doctor." },
        { en: "plant", ipa: "/plɑːnt/", vn: "cây cối / thực vật", ex: "She loves gardening and plants." },
        { en: "specialist", ipa: "/ˈspeʃ.əl.ɪst/", vn: "chuyên gia", ex: "Her daughter is a specialist in plants." },
        { en: "language course", ipa: "/ˈlæŋ.ɡwɪdʒ kɔːs/", vn: "khóa học ngôn ngữ", ex: "I am taking a language course in London." },
        { en: "Southern Italy", ipa: "/ˈsʌð.ən ˈɪt.əl.i/", vn: "miền Nam nước Ý", ex: "She is from Rome in Southern Italy." },
        { en: "friendly", ipa: "/ˈfrend.li/", vn: "thân thiện", ex: "She is a quiet but friendly person." },
        { en: "next month", ipa: "/nekst mʌnθ/", vn: "tháng sau", ex: "I am happy to come to London next month." },
        { en: "child", ipa: "/tʃaɪld/", vn: "đứa trẻ (số ít)", ex: "She has one child." },
        { en: "children", ipa: "/ˈtʃɪl.drən/", vn: "trẻ em / con cái (số nhiều)", ex: "She has two children." },
        { en: "computer", ipa: "/kəmˈpjuː.tər/", vn: "máy tính", ex: "Her son works with computers." },
        { en: "regularly", ipa: "/ˈreɡ.jə.lə.li/", vn: "thường xuyên", ex: "I see my children regularly." }
    ];

    let curIdx = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    window.showScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }

    window.startSection = (mode) => {
        curIdx = 0;
        if(mode === 'study') {
            const grid = document.getElementById('items-grid'); grid.innerHTML = '';
            database.forEach((item, i) => {
                const d = document.createElement('div'); d.className = 'item-box';
                d.textContent = item.en; d.onclick = () => { curIdx = i; showCard(); };
                grid.appendChild(d);
            });
            showScreen('list-selection');
        } else { showScreen('quiz-section'); loadQuiz(); }
    }

    function showCard() { showScreen('flashcard-section'); updateCard(); }
    function updateCard() {
        const item = database[curIdx];
        document.getElementById('main-card').classList.remove('flipped');
        document.getElementById('display-term').textContent = item.en;
        document.getElementById('display-ipa').textContent = item.ipa;
        document.getElementById('display-mean').textContent = item.vn;
        document.getElementById('display-ex').textContent = "Ví dụ: " + item.ex;
    }

    window.flipCard = () => document.getElementById('main-card').classList.toggle('flipped');
    window.next = () => { if(curIdx < database.length - 1) { curIdx++; updateCard(); } else { finish(); } }
    window.prev = () => { if(curIdx > 0) { curIdx--; updateCard(); } }

    function loadQuiz() {
        const item = database[curIdx];
        const input = document.getElementById('quiz-input');
        document.getElementById('quiz-vn').textContent = item.vn;
        document.getElementById('quiz-feedback').textContent = '';
        document.getElementById('btn-next-quiz').disabled = true;
        input.value = ''; input.className = 'quiz-input'; input.focus();
    }

    document.getElementById('quiz-input').addEventListener('keydown', function(e) {
        if(e.key === 'Enter') {
            const btnNext = document.getElementById('btn-next-quiz');
            if(!btnNext.disabled) { nextQuiz(); return; }
            const val = this.value.trim().toLowerCase();
            const correct = database[curIdx].en.toLowerCase();
            if(val === correct) {
                this.classList.add('correct'); playSysSound('correct');
                document.getElementById('quiz-feedback').innerHTML = "<span style='color:var(--success)'>Tuyệt vời!</span>";
                btnNext.disabled = false; speak(correct);
            } else {
                this.classList.add('shake', 'incorrect'); playSysSound('wrong');
                document.getElementById('quiz-feedback').innerHTML = `<span style='color:var(--error)'>Sai rồi! Đáp án: ${correct}</span>`;
                setTimeout(() => this.classList.remove('shake', 'incorrect'), 400);
            }
        }
    });

    window.nextQuiz = () => { if(curIdx < database.length - 1) { curIdx++; loadQuiz(); } else { finish(); } }
    function finish() { showScreen('congrats-screen'); confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); }
    window.speakCurrent = (e) => { e.stopPropagation(); speak(database[curIdx].en); }
    function speak(t) { const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }

    function playSysSound(type) {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if(type === 'correct') { osc.frequency.setValueAtTime(523, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); }
        else { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, audioCtx.currentTime); }
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }
</script>
</body>
</html>
